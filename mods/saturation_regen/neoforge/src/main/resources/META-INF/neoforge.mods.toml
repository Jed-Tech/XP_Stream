modLoader = "javafml"
loaderVersion = "[1,)"
license = "CC-BY-NC-ND-4.0"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
description = "Server-side natural regen from saturation without a full hunger bar, gated by a configurable minimum food level. Preserves vanilla cadence and exhaustion."
authors = ["Jed-Tech"]
license = "CC-BY-NC-ND-4.0"
logoFile = "saturation_regen_logo.png"

[[dependencies.${mod_id}]]
modId = "neoforge"
mandatory = true
versionRange = "[${neoforge_dependency_minimum},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "[26.1-,)"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "saturation_regen.neoforge.mixins.json"
environment = "*"
