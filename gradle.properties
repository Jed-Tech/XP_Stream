# Repo-wide and branch-scoped (no per-mod metadata here)
maven_group=com.jedtech

# Versions
# Shared minecraft_version: used for Fabric Loom/Minecraft dependency resolution during dev builds.
# We pin this to the newest available 26.1 pre-release identifier we can actually resolve (pre-3),
# while keeping loader metadata broad for the full 26.1 family.
minecraft_version=26.1-pre-3

# Fabric
fabric_loader_version=0.18.4
fabric_loom_version=1.15.0-alpha.25
fabric_api_version=0.141.2+26.1

# NeoForge (26.1.0.0-alpha.15+pre-3 bundles Minecraft 26.1 pre-3; Maven latest/release per maven-metadata.xml)
neoforge_version=26.1.0.0-alpha.15+pre-3
moddevgradle_version=2.0.140

org.gradle.jvmargs=-Xmx2G
# Java 25 for 26.1
org.gradle.java.home=C\:\\Program Files\\Eclipse Adoptium\\jdk-25.0.1.8-hotspot
